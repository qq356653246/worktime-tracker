name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with full output
      run: |
        echo "=== Starting Gradle Build ==="
        ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee full_build.log
        echo "=== Build finished ==="
      continue-on-error: true

    - name: Show build log tail
      run: tail -n 200 full_build.log || true

    - name: Find APK files
      run: find . -name "*.apk" -type f || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: worktime-tracker-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: full_build.log
        retention-days: 7
